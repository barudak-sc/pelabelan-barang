<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" fill="none">
  <!-- Icon: Box with scan lines (inventory tracking) -->
  <rect x="2" y="8" width="24" height="24" rx="4" fill="#465fff"/>
  <!-- Box top flaps -->
  <path d="M8 8V5M18 8V5" stroke="#465fff" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="8" y="3" width="12" height="5" rx="2" fill="#7592ff"/>
  <!-- Scan checkmark inside box -->
  <path d="M9 20l4 4 6-8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Horizontal scan lines -->
  <line x1="7" y1="14" x2="21" y2="14" stroke="white" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>

  <!-- Text: InvenTrack (dark mode - white text) -->
  <text x="34" y="26" font-family="Outfit, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="white" letter-spacing="-0.3">
    Inven<tspan fill="#7592ff">Track</tspan>
  </text>
</svg>
